<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.A.M - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2980 0%, #26d0ce 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 420px;
            padding: 50px;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo h1 {
            color: #1a2980;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .logo .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #1a2980;
            box-shadow: 0 0 0 3px rgba(26, 41, 128, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a2980 0%, #26d0ce 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .erro {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid #c33;
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .info {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        
        .info p {
            margin: 5px 0;
        }
        
        .info .sistema {
            color: #1a2980;
            font-weight: bold;
        }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ddd;
            border-top-color: #1a2980;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="icon">🌊</div>
            <h1>R.I.A.M</h1>
            <p>Robô Inteligente Anti Derrame Marítimo</p>
        </div>
        
        {% if erro %}
        <div class="erro">
            ❌ {{ erro }}
        </div>
        {% endif %}
        
        <form method="POST" id="loginForm">
            <div class="form-group">
                <label>📧 E-mail</label>
                <input type="email" 
                       name="email" 
                       placeholder="Digite seu e-mail" 
                       required 
                       autofocus>
            </div>
            
            <div class="form-group">
                <label>🔒 Senha</label>
                <input type="password" 
                       name="password" 
                       placeholder="Digite sua senha" 
                       required>
            </div>
            
            <button type="submit" id="btnLogin">
                Entrar no Sistema
            </button>
            
            <div class="loading" id="loading">
                <span class="spinner"></span> Autenticando...
            </div>
        </form>
        
        <div class="info">
            <p class="sistema">🌊 Sistema de Monitoramento de Derrames Marítimos</p>
            <p>R.I.A.M - Projeto de TCC</p>
            <p>© 2024 - Todos os direitos reservados</p>
        </div>
    </div>
    
    <script>
        // Efeito de loading ao enviar o formulário
        document.getElementById('loginForm').addEventListener('submit', function() {
            document.getElementById('btnLogin').style.opacity = '0.7';
            document.getElementById('btnLogin').disabled = true;
            document.getElementById('loading').classList.add('show');
        });
        
        // Limpar mensagem de erro ao começar a digitar
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                const erroDiv = document.querySelector('.erro');
                if (erroDiv) {
                    erroDiv.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
